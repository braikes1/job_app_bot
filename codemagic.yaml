workflows:
  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 60
    integrations:
      app_store_connect: App Store Connect
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.jobot.app"
        XCODE_SCHEME: "Runner"
      groups:
        - app_store_credentials
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Set build number
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo "0")
          BUILD_NUMBER=$(( LATEST + 1 ))
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $CM_ENV

      - name: Install dependencies
        script: |
          cd $CM_BUILD_DIR/mobile
          flutter pub get
          flutter create . --platforms=ios
          # Set correct bundle ID (flutter create defaults to com.example.*)
          sed -i '' 's/com.example.jobBotMobile/com.jobot.app/g' ios/Runner.xcodeproj/project.pbxproj
          # Set development team so xcode-project use-profiles can match signing profiles
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = 9QR7CH4M3P;/g' ios/Runner.xcodeproj/project.pbxproj
          # Verify the replacements took effect
          echo "=== Bundle ID entries ==="
          grep -c "com.jobot.app" ios/Runner.xcodeproj/project.pbxproj || echo "0 matches"
          echo "=== Team ID entries ==="
          grep -c "9QR7CH4M3P" ios/Runner.xcodeproj/project.pbxproj || echo "0 matches"

      - name: Set up iOS code signing
        script: |
          keychain initialize
          # Generate RSA private key for distribution certificate
          openssl genrsa -out /tmp/cert_key.pem 2048
          # Fetch/create signing files using the explicit certificate key
          app-store-connect fetch-signing-files $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @file:/tmp/cert_key.pem
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          cd $CM_BUILD_DIR/mobile
          flutter build ipa \
            --release \
            --build-number=$BUILD_NUMBER \
            --dart-define=API_BASE_URL=$API_BASE_URL \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - mobile/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

  ios-debug:
    name: iOS Debug (Device Testing)
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          cd $CM_BUILD_DIR/mobile
          flutter pub get
      - name: Build iOS debug
        script: |
          cd $CM_BUILD_DIR/mobile
          flutter build ios --debug --no-codesign
    artifacts:
      - mobile/build/ios/iphoneos/Runner.app
